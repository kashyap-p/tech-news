<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechNews Worldwide</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round">
              <path
                d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-4 0v-9a2 2 0 0 1 2-2h2" />
              <path d="M18 14h-8" />
              <path d="M15 18h-5" />
              <path d="M10 6h8v4h-8Z" />
            </svg>
          </div>
          <span class="logo-text">TechNews</span>
          <span class="logo-badge">Live</span>
        </div>
        <div class="header-controls">
          <div class="search-box">
            <input
              type="text"
              id="searchInput"
              placeholder="Search news..."
              aria-label="Search news" />
            <button id="searchBtn" aria-label="Search">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
              </svg>
            </button>
          </div>
          <button class="btn btn-primary" id="refreshBtn">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
              <path d="M3 3v5h5" />
              <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
              <path d="M16 21h5v-5" />
            </svg>
            Refresh
          </button>
        </div>
      </div>
    </div>
    <div class="container">
      <div class="hero">
        <h1>Explore Tech News</h1>
        <p>
          Curated from Dev.to, Hacker News, and trending tech discussions
          worldwide
        </p>
        <div class="hero-stats">
          <span class="hero-stat"
            ><strong id="articleCount">0</strong> articles loaded</span
          >
          <span class="hero-stat"><strong>3</strong> sources</span>
          <span class="hero-stat"
            ><strong id="lastUpdated">just now</strong></span
          >
        </div>
      </div>
      <div class="source-tabs" id="sourceTabs">
        <button class="source-tab active" data-source="all">All Sources</button>
        <button class="source-tab" data-source="devto">Dev.to</button>
        <button class="source-tab" data-source="hackernews">Hacker News</button>
      </div>
      <div class="news-grid" id="newsGrid"></div>
      <div class="footer">
        Made with &hearts; &middot; Powered by
        <a href="https://dev.to" target="_blank" rel="noopener">Dev.to</a> &amp;
        <a href="https://news.ycombinator.com" target="_blank" rel="noopener"
          >Hacker News</a
        >
      </div>
    </div>
    <div class="toast" id="toast">
      <span class="toast-icon">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="15" y1="9" x2="9" y2="15" />
          <line x1="9" y1="9" x2="15" y2="15" />
        </svg>
      </span>
      <span class="toast-msg"></span>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
